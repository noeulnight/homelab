apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iperf3
  namespace: argocd
spec:
  destination:
    namespace: iperf3
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: iperf3
      repoURL: oci://registry-1.docker.io/gradiantcharts/iperf3
      targetRevision: "0.1.3"
      helm:
        releaseName: iperf3
        valuesObject:
          image:
            repository: networkstatic/iperf3
          replicaCount: 1
          format: M
          interval: 1
          service:
            type: ClusterIP
          resources: {}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: none
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
