apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  name: obsync-secret
  namespace: obsync
spec:
  encryptedData:
    DATABASE_URL: 
    JWT_ACCESS_SECRET: 
    JWT_REFRESH_SECRET: 
    S3_ACCESS_KEY_ID: 
    S3_SECRET_ACCESS_KEY: 
  template:
    metadata:
      name: obsync-secret
      namespace: obsync
