apiVersion: v1
kind: Service
metadata:
  annotations:
    tailscale.com/tailnet-fqdn: limtaehyun-pi.tail6de6ea.ts.net
  name: pi
spec:
  externalName: pi
  type: ExternalName
  ports:
    - port: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: tailscale-exporter
  labels:
    app.kubernetes.io/name: tailscale-exporter
spec:
  selector:
    app: tailscale-exporter
  ports:
    - name: metrics
      protocol: TCP
      port: 9250
      targetPort: 9250
