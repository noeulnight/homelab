apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: n8n
  namespace: prometheus
spec:
  route:
    receiver: n8n
    groupBy:
      - namespace
      - alertname
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: =
            value: Watchdog
  receivers:
    - name: "null"
    - name: n8n
      webhookConfigs:
        - urlSecret:
            name: alertmanager-n8n
            key: url
          sendResolved: true
