apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tailscale
  namespace: prometheus
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - tailscale
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s