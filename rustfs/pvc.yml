apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rustfs-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: rustfs-data-pv
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rustfs-logs-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: rustfs-logs-pv
  resources:
    requests:
      storage: 10Gi
