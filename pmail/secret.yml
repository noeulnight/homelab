    IMAP_HOST: 
    IMAP_MAILBOX: 
    IMAP_PASSWORD: 
    IMAP_POLL_SECONDS: 
    IMAP_PORT: 
    IMAP_SECURE: 
    IMAP_USER: 
    OIDC_CLIENT_ID: 
    OIDC_CLIENT_SECRET: 
    OIDC_DISCOVERY_URL: 
    ORIGIN: 
    SMTP_FROM: 
    SMTP_HOST: 
    SMTP_PASSWORD: 
    SMTP_PORT: 
    SMTP_SECURE: 
    SMTP_USER: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      name: pmail-secret
      namespace: pmail
