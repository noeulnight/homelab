apiVersion: apps/v1
kind: Deployment
metadata:
  name: solidtime
  labels:
    app.kubernetes.io/version: v1
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: solidtime-app
  template:
    metadata:
      labels:
        app: solidtime-app
        app.kubernetes.io/version: v1
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: prepare-storage
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/www/html/storage/app/public
              mkdir -p /var/www/html/storage/framework/cache/data
              mkdir -p /var/www/html/storage/framework/sessions
              mkdir -p /var/www/html/storage/framework/views
              mkdir -p /var/www/html/storage/logs
              chown -R 1000:1000 /var/www/html/storage
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
        - name: bootstrap
          image: solidtime/solidtime:latest
          command:
            - sh
            - -ec
            - |
              until php artisan migrate --force; do
                echo "waiting for postgres"
                sleep 5
              done
              php artisan storage:link || true
              if [ ! -f /var/www/html/storage/oauth-private.key ] || [ ! -f /var/www/html/storage/oauth-public.key ]; then
                php artisan passport:keys --force
              fi
          envFrom:
            - configMapRef:
                name: solidtime-config
            - secretRef:
                name: solidtime-secrets
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/zz-memory-limit.ini
              subPath: zz-memory-limit.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/docker-php-ext-vips.ini
              subPath: docker-php-ext-vips.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/docker-php-ext-uv.ini
              subPath: docker-php-ext-uv.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/docker-php-ext-rdkafka.ini
              subPath: docker-php-ext-rdkafka.ini
      containers:
        - name: app
          image: solidtime/solidtime:latest
          ports:
            - containerPort: 8000
          env:
            - name: CONTAINER_MODE
              value: http
          envFrom:
            - configMapRef:
                name: solidtime-config
            - secretRef:
                name: solidtime-secrets
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/zz-memory-limit.ini
              subPath: zz-memory-limit.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/docker-php-ext-vips.ini
              subPath: docker-php-ext-vips.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/docker-php-ext-uv.ini
              subPath: docker-php-ext-uv.ini
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/docker-php-ext-rdkafka.ini
              subPath: docker-php-ext-rdkafka.ini
            - name: octane-config
              mountPath: /etc/supervisor/conf.d/supervisord.frankenphp.conf
              subPath: supervisord.frankenphp.conf
          startupProbe:
            httpGet:
              path: /health-check/up
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health-check/up
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health-check/up
              port: 8000
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: solidtime-pvc
        - name: php-config
          configMap:
            name: solidtime-php-config
        - name: octane-config
          configMap:
            name: solidtime-octane-config
---
