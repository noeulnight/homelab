apiVersion: apps/v1
kind: Deployment
metadata:
  name: solidtime-queue
  labels:
    app.kubernetes.io/version: v1
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: solidtime-queue
  template:
    metadata:
      labels:
        app: solidtime-queue
        app.kubernetes.io/version: v1
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: prepare-storage
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/www/html/storage/app/public
              mkdir -p /var/www/html/storage/framework/cache/data
              mkdir -p /var/www/html/storage/framework/sessions
              mkdir -p /var/www/html/storage/framework/views
              mkdir -p /var/www/html/storage/logs
              chown -R 1000:1000 /var/www/html/storage
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
        - name: wait-bootstrap
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              until [ -f /var/www/html/storage/oauth-private.key ] && [ -f /var/www/html/storage/oauth-public.key ]; do
                echo "waiting for bootstrap"
                sleep 5
              done
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
      containers:
        - name: queue
          image: solidtime/solidtime:latest
          env:
            - name: CONTAINER_MODE
              value: worker
            - name: WORKER_COMMAND
              value: php /var/www/html/artisan queue:work
          envFrom:
            - configMapRef:
                name: solidtime-config
            - secretRef:
                name: solidtime-secrets
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/zz-memory-limit.ini
              subPath: zz-memory-limit.ini
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: solidtime-pvc
        - name: php-config
          configMap:
            name: solidtime-php-config
---
