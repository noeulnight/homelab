apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: kurrier-kong
  labels:
    app.kubernetes.io/name: kurrier-kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kurrier-kong
  template:
    metadata:
      labels:
        app: kurrier-kong
        app.kubernetes.io/name: kurrier-kong
    spec:
      containers:
        - name: kong
          image: kong:2.8.1
          command:
            - /bin/sh
            - -ec
            - |
              eval "echo \"$$(cat /home/kong/temp.yml)\"" > /home/kong/kong.yml
              exec /docker-entrypoint.sh kong docker-start
          ports:
            - containerPort: 8000
            - containerPort: 8443
          env:
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: kurrier-secrets
                  key: ANON_KEY
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: kurrier-secrets
                  key: SERVICE_ROLE_KEY
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /home/kong/kong.yml
            - name: KONG_DNS_ORDER
              value: LAST,A,CNAME
            - name: KONG_PLUGINS
              value: request-transformer,cors,key-auth,acl,request-termination
            - name: KONG_NGINX_PROXY_PROXY_BUFFER_SIZE
              value: 160k
            - name: KONG_NGINX_PROXY_PROXY_BUFFERS
              value: 64 160k
          volumeMounts:
            - name: kong-config
              mountPath: /home/kong/temp.yml
              subPath: kong.yml
              readOnly: true
      volumes:
        - name: kong-config
          configMap:
            name: kurrier-kong-config
---
