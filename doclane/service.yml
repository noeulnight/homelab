apiVersion: v1
kind: Service
metadata:
  name: doclane-backend-service
spec:
  selector:
    app: doclane-backend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: doclane-frontend-service
spec:
  selector:
    app: doclane-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
