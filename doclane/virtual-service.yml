apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: doclane
spec:
  hosts:
    - "doclane.lth.so"
  gateways:
    - istio-ingress/public-gateway
  http:
    - match:
        - uri:
            regex: /api(/|$)(.*)
      rewrite:
        uriRegexRewrite:
          match: ^/api(/|$)(.*)
          rewrite: "/\\2"
      route:
        - destination:
            host: doclane-backend-service.doclane.svc.cluster.local
            port:
              number: 3000
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: doclane-frontend-service.doclane.svc.cluster.local
            port:
              number: 3000
