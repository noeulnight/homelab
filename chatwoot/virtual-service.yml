apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: chatwoot
spec:
  hosts:
    - "support.lth.so"
    - "support.limtaehyun.dev"
  gateways:
    - istio-ingress/public-gateway
  http:
    - match:
        - headers:
            :authority:
              exact: support.limtaehyun.dev
      redirect:
        authority: support.lth.so
    - route:
        - destination:
            host: chatwoot.chatwoot.svc.cluster.local
            port:
              number: 3000
      headers:
        response:
          set:
            Strict-Transport-Security: max-age=31536000; includeSubDomains
