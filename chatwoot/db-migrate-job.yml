apiVersion: batch/v1
kind: Job
metadata:
  name: chatwoot-migrate
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: chatwoot
        role: migrate
    spec:
      serviceAccountName: chatwoot
      restartPolicy: Never
      initContainers:
        - name: init-postgres
          image: chatwoot/chatwoot:v4.12.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - until pg_isready -h postgres-service.postgres.svc.cluster.local -p 5432 -U chatwoot; do sleep 2; done
        - name: init-redis
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - until nslookup redis-service.redis.svc.cluster.local; do sleep 2; done
      containers:
        - name: db-migrate
          image: chatwoot/chatwoot:v4.12.1
          imagePullPolicy: IfNotPresent
          args:
            - bundle
            - exec
            - rails
            - db:chatwoot_prepare
          envFrom:
            - secretRef:
                name: chatwoot-env
          volumeMounts:
            - name: cache
              mountPath: /app/tmp
      volumes:
        - name: cache
          emptyDir: {}
